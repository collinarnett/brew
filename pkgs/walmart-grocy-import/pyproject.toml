[project]
name = "walmart-grocy-import"
version = "0.1.0"
description = "Import Walmart order history into Grocy inventory"
requires-python = ">=3.11"
dependencies = [
  "browser-cookie3",
  "playwright",
  "pydantic",
  "requests",
  "thefuzz",
]

[project.scripts]
walmart-grocy-import = "walmart_grocy_import:main"

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"
